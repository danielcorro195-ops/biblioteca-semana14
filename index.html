<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Escolar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bs-primary: #2c3e50;
            --bs-primary-dark: #1a252f;
            --bs-secondary: #e74c3c;
        }

        body {
            background: #f5f6fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .dark-mode {
            background: #121212;
            color: white;
        }

        .dark-mode .card {
            background: #1f1f1f;
            color: white;
        }

        .card {
            border-radius: 15px;
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .navbar {
            background: var(--bs-primary);
        }

        .stats-card {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand">
                📚 Biblioteca Escolar
            </span>

            <button class="btn btn-warning" onclick="cambiarTema()">
                🌙 Tema
            </button>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="mb-3">Registrar Libro</h2>

        <div class="row g-2">

            <div class="col-md-3">
                <input id="titulo" class="form-control" placeholder="Título">
            </div>

            <div class="col-md-3">
                <input id="autor" class="form-control" placeholder="Autor">
            </div>

            <div class="col-md-2">
                <input id="anio" type="number" class="form-control" placeholder="Año">
            </div>

            <div class="col-md-2">
                <select id="categoria" class="form-select">
                    <option>Ficción</option>
                    <option>No ficción</option>
                    <option>Ciencia</option>
                    <option>Historia</option>
                    <option>Tecnología</option>
                </select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="agregarLibro()">
                    Agregar
                </button>
            </div>

        </div>

        <hr>

        <h3>Filtros</h3>

        <div class="row mb-3">

            <div class="col-md-4">
                <input id="searchFilter" class="form-control"
                    placeholder="Buscar libro o autor">
            </div>

            <div class="col-md-3">
                <select id="availabilityFilter" class="form-select">
                    <option value="all">Todos</option>
                    <option value="available">Disponibles</option>
                    <option value="borrowed">Prestados</option>
                </select>
            </div>

            <div class="col-md-2">
                <input id="yearMin" class="form-control" placeholder="Desde">
            </div>

            <div class="col-md-2">
                <input id="yearMax" class="form-control" placeholder="Hasta">
            </div>

            <div class="col-md-1">
                <button class="btn btn-secondary" onclick="limpiarFiltros()">
                    X
                </button>
            </div>

        </div>

        <p id="resultCount"></p>

        <div id="librosContainer" class="row"></div>

        <hr>

        <h3>Estadísticas</h3>

        <canvas id="estadisticasChart"></canvas>

        <div id="statsSummary" class="mt-3"></div>

        <hr>

        <h3>Top Libros Más Leídos</h3>

        <div id="masLeidos"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="script.js"></script>

</body>
</html>
